services:
  - type: web
    name: smartagri-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: smartagri-postgres
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: smartagri-postgres
    plan: free
